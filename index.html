<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASMIT Portfolio - Robotics Engineer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100vh;
  }
  .info {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    color: #ff0015;
    font-size: 24px;
    font-weight: bold;
  }
</style>
</head>
<body>
<div class="info">🤖 ASMIT PORTFOLIO</div>
<canvas id="robotCanvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const canvas = document.getElementById("robotCanvas");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(3, 2, 5);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const mainLight = new THREE.DirectionalLight(0xff4444, 2);
mainLight.position.set(5, 5, 5);
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x4444ff, 1);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff0000, 1.5);
rimLight.position.set(0, 3, -5);
scene.add(rimLight);

// Ground glow
const glowGeo = new THREE.CircleGeometry(3, 64);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0xff0015,
  transparent: true,
  opacity: 0.15,
  side: THREE.DoubleSide
});
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.rotation.x = -Math.PI / 2;
glow.position.y = -1.2;
scene.add(glow);

// Platform rings
const ringMat = new THREE.MeshBasicMaterial({
  color: 0xff0015,
  transparent: true,
  opacity: 0.4,
  wireframe: true
});
for (let i = 0; i < 3; i++) {
  const ring = new THREE.Mesh(new THREE.TorusGeometry(1.5 + i * 0.4, 0.02, 16, 64), ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = -1.1 + i * 0.05;
  scene.add(ring);
}

// Robot
let robot = null;
const loader = new GLTFLoader();

loader.load(
  "https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb",
  (gltf) => {
    robot = gltf.scene;
    robot.scale.set(0.8, 0.8, 0.8);
    robot.position.set(0, -0.5, 0);
    scene.add(robot);
    console.log("✅ Robot loaded!");
  },
  (xhr) => {
    console.log((xhr.loaded / xhr.total * 100) + "% loaded");
  },
  (error) => {
    console.error("❌ Robot load error:", error);
    // Fallback - cube
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.MeshStandardMaterial({ color: 0xff0015, emissive: 0x440000 })
    );
    cube.position.set(0, 0, 0);
    scene.add(cube);
  }
);

// Mouse interaction
let mouseX = 0;
let mouseY = 0;
document.addEventListener("mousemove", (e) => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation
function animate() {
  requestAnimationFrame(animate);
  const time = Date.now() * 0.001;

  // Glow pulse
  glowMat.opacity = 0.1 + Math.sin(time * 0.5) * 0.05;

  // Robot rotation
  if (robot) {
    robot.rotation.y += (mouseX * 0.3 - robot.rotation.y) * 0.02;
    robot.position.y = -0.5 + Math.sin(time * 0.5) * 0.05;
    robot.rotation.x = Math.sin(time * 0.3) * 0.05;
  }

  // Camera orbit
  camera.position.x = 3 + Math.sin(time * 0.1) * 1.5;
  camera.position.z = 5 + Math.cos(time * 0.1) * 1.5;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

console.log("🚀 Portfolio started!");
</script>
</body>
</html>
